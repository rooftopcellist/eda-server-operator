---

- name: Set actual old postgres configuration secret name
  set_fact:
    old_postgres_configuration_name: "{{ old_pg_config['resources'][0]['metadata']['name'] }}"

- name: Store Database Configuration
  set_fact:
    eda_old_postgres_user: "{{ old_pg_config['resources'][0]['data']['username'] | b64decode }}"
    eda_old_postgres_pass: "{{ old_pg_config['resources'][0]['data']['password'] | b64decode }}"
    eda_old_postgres_database: "{{ old_pg_config['resources'][0]['data']['database'] | b64decode }}"
    eda_old_postgres_port: "{{ old_pg_config['resources'][0]['data']['port'] | b64decode }}"
    eda_old_postgres_host: "{{ old_pg_config['resources'][0]['data']['host'] | b64decode }}"
  no_log: "{{ no_log }}"

- name: Set Default label selector for custom resource generated postgres
  set_fact:
    postgres_label_selector: "app.kubernetes.io/instance=postgres-{{ supported_pg_version }}-{{ ansible_operator_meta.name }}"
  when: postgres_label_selector is not defined

- name: Get the postgres pod information
  k8s_info:
    kind: Pod
    namespace: "{{ ansible_operator_meta.namespace }}"
    label_selectors:
      - "{{ postgres_label_selector }}"
    field_selectors:
      - status.phase=Running
  register: postgres_pod

- name: Set the resource pod name as a variable.
  set_fact:
    postgres_pod_name: "{{ postgres_pod['resources'][0]['metadata']['name'] }}"

# Scale down deployments for migration
- name: Get EDA Deployments
  k8s_info:
    kind: Deployment
    namespace: "{{ ansible_operator_meta.namespace }}"
    name: "{{ item }}"
  register: deployment_info
  loop:
    - '{{ ansible_operator_meta.name }}-activation-worker'
    - '{{ api_server_name }}'
    - '{{ ansible_operator_meta.name }}-default-worker'
    - '{{ event_stream_server_name }}'
    - '{{ ansible_operator_meta.name }}-scheduler'

- name: Scale down EDA Deployments if they exist
  kubernetes.core.k8s:
    state: patched
    kind: Deployment
    namespace: "{{ ansible_operator_meta.namespace }}"
    name: "{{ item.item }}"
    definition:
      spec:
        replicas: 0
  loop: "{{ deployment_info.results }}"
  when: item.resources is defined and item.resources | length > 0

- name: Get EDA UI Deployment
  k8s_info:
    kind: Deployment
    namespace: "{{ ansible_operator_meta.namespace }}"
    name: "{{ ansible_operator_meta.name }}-ui"
  register: ui_deployment_info
  when: not ui_disabled

- name: Scale down EDA UI if it exists
  kubernetes.core.k8s:
    state: patched
    kind: Deployment
    namespace: "{{ ansible_operator_meta.namespace }}"
    name: "{{ ansible_operator_meta.name }}-ui"
    definition:
      spec:
        replicas: 0
  when:
    - not ui_disabled
    - ui_deployment_info.resources is defined and ui_deployment_info.resources | length > 0

- name: Get Redis Deployment
  k8s_info:
    kind: Deployment
    namespace: "{{ ansible_operator_meta.namespace }}"
    name: "{{ ansible_operator_meta.name }}-redis"
  register: redis_deployment_info
  when: redis_type == "managed"

- name: Scale down Redis Deployment if it exists
  kubernetes.core.k8s:
    state: patched
    kind: Deployment
    namespace: "{{ ansible_operator_meta.namespace }}"
    name: "{{ ansible_operator_meta.name }}-redis"
    definition:
      spec:
        replicas: 0
  when:
    - redis_type == "managed"
    - redis_deployment_info.resources is defined and redis_deployment_info.resources | length > 0

- name: Set pg_dump command
  set_fact:
    pgdump: >-
      pg_dump
      -h {{ eda_old_postgres_host }}
      -U {{ eda_old_postgres_user }}
      -d {{ eda_old_postgres_database }}
      -p {{ eda_old_postgres_port }}
      -F custom
      {{ pg_dump_suffix }}
  no_log: "{{ no_log }}"

- name: Set pg_restore command
  set_fact:
    pg_restore: >-
      pg_restore --clean --if-exists
      -U {{ eda_postgres_user }}
      -d {{ eda_postgres_database }}
  no_log: "{{ no_log }}"

- name: Stream backup from pg_dump to the new postgresql container
  k8s_exec:
    namespace: "{{ ansible_operator_meta.namespace }}"
    pod: "{{ postgres_pod_name }}"
    command: |
      bash -c "
      function end_keepalive {
        rc=$?
        rm -f \"$1\"
        kill $(cat /proc/$2/task/$2/children 2>/dev/null) 2>/dev/null || true
        wait $2 || true
        exit $rc
      }
      keepalive_file=\"$(mktemp)\"
      while [[ -f \"$keepalive_file\" ]]; do
        echo 'Migrating data from old database...'
        sleep 60
      done &
      keepalive_pid=$!
      trap 'end_keepalive \"$keepalive_file\" \"$keepalive_pid\"' EXIT SIGINT SIGTERM
      echo keepalive_pid: $keepalive_pid
      set -e -o pipefail
      psql -c 'GRANT postgres TO {{ eda_postgres_user }}'
      PGPASSWORD=\"$PGPASSWORD_OLD\" {{ pgdump }} | PGPASSWORD=\"$POSTGRES_PASSWORD\" {{ pg_restore }}
      psql -c 'REVOKE postgres FROM {{ eda_postgres_user }}'
      set +e +o pipefail
      echo 'Successful'
      "
  no_log: "{{ no_log }}"
  register: data_migration

- name: Set flag signifying that this instance has been migrated
  set_fact:
    eda_migrated_from_secret: "{{ old_postgres_configuration_name }}"
